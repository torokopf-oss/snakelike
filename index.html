<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Змейка (модульная)</title>
    <style>
        body {
            margin: 0; padding: 0;
            background: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .game-area {
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            justify-content: center;
            gap: 10px;
        }

        .side-panel {
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            gap: 8px;
            color: white;
            font-size: 16px;
            width: 120px;
            text-align: left;
        }

        .info-item {
            white-space: nowrap;
        }

        canvas {
            border: 2px solid #e94560;
            background: #16213e;
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.4);
        }

        #hungerBarContainer {
            width: 14px;
            height: 400px;
            background: #0f0f1a;
            border: 1px solid #e94560;
            border-radius: 4px;
            overflow: hidden;
            flex-shrink: 0;
        }

        #hungerBar {
            width: 100%;
            height: 100%;
            background: #f1c40f;
            transition: height 0.5s, background 0.5s;
        }

        #hungerBar.starving {
            background: #e74c3c;
        }

       .help-button {
    margin-top: 12px;          /* отступ от таймера */
    background: none;
    border: 1px solid #aaa;
    color: #aaa;
    padding: 4px 12px;
    font-size: 14px;
    border-radius: 4px;
    cursor: pointer;
    width: 100%;               /* на всю ширину панели */
    text-align: center;
}

        .modal {
            display: none;
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 10;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            font-family: 'Segoe UI', sans-serif;
        }

        .modal.active {
            display: flex;
        }

        .modal h2 {
            font-size: 36px;
            margin-bottom: 10px;
        }

        .modal p {
            font-size: 18px;
            margin-bottom: 20px;
            text-align: center;
        }

        .modal button {
            padding: 10px 30px;
            font-size: 20px;
            background: #e94560;
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="game-container" id="gameContainer">
    <div class="game-area">
    <div class="side-panel">
    <div class="info-item">🍎 Очки: <span id="scoreDisplay">0</span></div>
    <div class="info-item">💩 <span id="poopEatenDisplay">0/5</span></div>
    <div class="info-item">🏆 Рекорд: <span id="highScoreDisplay">0</span></div>
    <div class="info-item">⏱️ <span id="hungerTimerDisplay">15</span></div>
    <div class="info-item">🕒 <span id="gameTimeDisplay">00:00</span></div>
    <button class="help-button" id="helpButton">Справка</button>
</div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div id="hungerBarContainer">
            <div id="hungerBar"></div>
        </div>
    </div>
    <div id="gameOverText" style="display: none;"></div>

    <div class="modal active" id="startModal">
        <h2>Змейка</h2>
        <p>Питаться и расти, не умереть.</p>
        <button id="startButton">Начать (пробел)</button>
    </div>
    <div class="modal" id="phase2Modal">
        <h2>Выводок</h2>
        <p>Питаться и размножаться, защищать потомство.</p>
        <button id="phase2Button">Продолжить (пробел)</button>
    </div>
    <div class="modal" id="helpModal">
        <h2>Управление</h2>
        <p>Движение: стрелки<br>
        Выстрел: Z<br>
        Отложить яйцо / вылупить (если доступно): X<br>
        Пауза: P<br>
        Санация: S (накапливайте очки, чтобы восполнить заряды)</p>
        <button id="closeHelpButton">Закрыть (H)</button>
    </div>
</div>

<script src="config.js"></script>
<script src="state.js"></script>
<script src="render.js"></script>
<script src="snake.js"></script>
<script src="enemies.js"></script>
<script src="babies.js"></script>
<script src="jail.js"></script>
<script src="input.js"></script>
<script src="main.js"></script>
</body>
</html>
